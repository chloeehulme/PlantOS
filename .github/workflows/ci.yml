name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Restore dependencies
        run: dotnet restore PlantOS.slnx

      - name: Build solution
        run: dotnet build PlantOS.slnx --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test PlantOS.slnx --configuration Release --no-build --verbosity minimal

      - name: Verify formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic PlantOS.slnx
